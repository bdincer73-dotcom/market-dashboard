#
# "DRAM" and "BRR" are carried over as written in the tracker. If the news
# provider can't resolve a symbol, its tile shows UNAVAILABLE rather than
# guessing - check config/watchlist.yaml and fix the symbol if that happens
# (e.g. "DRAM" may need to map to an actual exchange ticker).

