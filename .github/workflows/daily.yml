name: Daily pre-market dashboard

on:
  schedule:
    # 13:00 UTC = 8:00 a.m. US Central Daylight Time (UTC-5, roughly Mar-Nov).
    # During Standard Time (UTC-6, roughly Nov-Mar) this fires at 7:00 a.m.
    # Central instead of 8:00. GitHub Actions cron doesn't support DST-aware
    # schedules, so either accept the ~1hr seasonal drift or maintain two
    # cron lines and comment one out around the clock-change dates.
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily dashboard build
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python -m src.main --run-type daily

      - name: Commit updated data + dashboard
        run: |
          git config user.name "market-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Daily dashboard run: $(date -u +%Y-%m-%d)"
          git push
