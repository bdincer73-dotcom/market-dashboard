name: Weekly review dashboard

on:
  schedule:
    # 13:00 UTC Saturday ≈ 8:00 a.m. Central (see daily.yml for the DST caveat).
    - cron: "0 13 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly review build
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python -m src.main --run-type weekly

      - name: Commit updated data + dashboard
        run: |
          git config user.name "market-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/ docs/
          git diff --cached --quiet || git commit -m "Weekly dashboard run: $(date -u +%Y-%m-%d)"
          # Rebase onto whatever's on origin/main right before pushing, in case
          # another commit (manual push, daily run, etc.) landed while this
          # job was building. Retries a few times in case of a tight race.
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "push attempt $i failed, retrying..."
            sleep $((RANDOM % 10 + 1))
          done
